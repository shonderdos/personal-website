name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: install nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci 
      - name: build angular project
        run: npm run build -- --configuration=production
      - name: Upload artifact from public folder
        uses: actions/upload-artifact@v4
        with: 
          name: public-folder
          path: ./dist/personal-website/browser
          retention-days: 5
          #- name: Upload artifact
          #uses: actions/upload-pages-artifact@v3
          #with:
          # path: ./public

  # Deployment job
  deploy:
    #environment:
    # name: github-pages
    # url: ${{ steps.deployment.outputs.page_url }}
    environment: 
      name: production
      url: 'https://www.shonderdos.nl/'
    runs-on: ubuntu-latest
    needs: build
    steps:
      #- name: Deploy to GitHub Pages
      #  id: deployment
      #  uses: actions/deploy-pages@v4
      - name: Dowload public folder artifacts
        uses: actions/download-artifact@v4
        with:
          name: public-folder
          path: ./dist/personal-website/browser
      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.shonderdos.nl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/personal-website/browser/
          server-dir: ${{ secrets.FTP_DOCUMENT_ROOT }}
